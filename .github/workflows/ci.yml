name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dependencies (all extras + dev)
      run: uv sync --all-extras --frozen
      env:
        UV_PYTHON: ${{ matrix.python-version }}

    - name: Run unit tests
      run: uv run pytest tests/ -v --no-cov -m "not integration"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dev tooling (ruff)
      run: uv sync --extra dev --frozen

    - name: Check for syntax errors and undefined names
      run: uv run ruff check style_checker/ tests/ --select=E9,F63,F7,F82

    - name: Full lint (informational)
      run: uv run ruff check style_checker/ tests/ --exit-zero
