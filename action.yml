name: 'QuantEcon Style Guide Checker'
description: 'Automated style guide compliance checking for QuantEcon lecture materials'
author: 'QuantEcon'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  mode:
    description: 'Review mode: "single" for one lecture, "bulk" for all lectures'
    required: true
  lectures-path:
    description: 'Path to lectures directory'
    required: false
    default: 'lectures/'
  anthropic-api-key:
    description: 'Anthropic API key for Claude Sonnet 4.5'
    required: true
  github-token:
    description: 'GitHub token for creating PRs and comments'
    required: true
  comment-body:
    description: 'Issue comment body (used in single mode to extract lecture name)'
    required: false
  llm-model:
    description: 'Specific Claude model to use (default: claude-sonnet-4-5-20250929)'
    required: false
    default: ''
  rule-categories:
    description: 'Comma-separated list of rule categories to check (leave empty for all)'
    required: false
    default: ''
  create-pr:
    description: 'Whether to create a PR with suggested changes'
    required: false
    default: 'true'
  pr-branch-prefix:
    description: 'Prefix for PR branch names'
    required: false
    default: 'style-guide'
  pr-labels:
    description: 'Comma-separated list of labels to add to the PR'
    required: false
    default: ''
  temperature:
    description: 'LLM temperature. Must be 1 for extended thinking (required by Anthropic).'
    required: false
    default: '1'

outputs:
  pr-number:
    description: 'Number of the created pull request'
    value: ${{ steps.run-checker.outputs.pr-number }}
  pr-url:
    description: 'URL of the created pull request'
    value: ${{ steps.run-checker.outputs.pr-url }}
  issues-found:
    description: 'Number of style guide issues found'
    value: ${{ steps.run-checker.outputs.issues-found }}
  lectures-reviewed:
    description: 'Number of lectures reviewed'
    value: ${{ steps.run-checker.outputs.lectures-reviewed }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        token: ${{ inputs.github-token }}
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        # By default setup-uv searches **/uv.lock in the consumer repo, which
        # won't have one. Point it at this action's own lockfile so the cache
        # key is keyed off our deps.
        cache-dependency-glob: ${{ github.action_path }}/uv.lock

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: uv sync --extra action --frozen

    - name: Run style checker
      id: run-checker
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        # User-controlled inputs are passed via env to avoid shell interpolation
        # (issue comments / PR bodies could otherwise inject shell commands).
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_LECTURES_PATH: ${{ inputs.lectures-path }}
        INPUT_LLM_MODEL: ${{ inputs.llm-model }}
        INPUT_RULE_CATEGORIES: ${{ inputs.rule-categories }}
        INPUT_CREATE_PR: ${{ inputs.create-pr }}
        INPUT_PR_BRANCH_PREFIX: ${{ inputs.pr-branch-prefix }}
        INPUT_PR_LABELS: ${{ inputs.pr-labels }}
        INPUT_TEMPERATURE: ${{ inputs.temperature }}
        INPUT_COMMENT_BODY: ${{ inputs.comment-body }}
        INPUT_REPOSITORY: ${{ github.repository }}
      run: |
        uv run python style_checker/action.py \
          --mode "$INPUT_MODE" \
          --lectures-path "$INPUT_LECTURES_PATH" \
          --llm-model "$INPUT_LLM_MODEL" \
          --rule-categories "$INPUT_RULE_CATEGORIES" \
          --create-pr "$INPUT_CREATE_PR" \
          --pr-branch-prefix "$INPUT_PR_BRANCH_PREFIX" \
          --pr-labels "$INPUT_PR_LABELS" \
          --temperature "$INPUT_TEMPERATURE" \
          --comment-body "$INPUT_COMMENT_BODY" \
          --repository "$INPUT_REPOSITORY"
